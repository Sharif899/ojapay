# railway.toml
[build]
  builder      = "NIXPACKS"
  buildCommand = "npm install && npx prisma generate && npx prisma migrate deploy && npm run build"

[deploy]
  startCommand  = "npm start"
  restartPolicyType   = "ON_FAILURE"
  restartPolicyMaxRetries = 3

[[services]]
  name = "ojapay-web"

[[services]]
  name     = "ojapay-db"
  plugin   = "postgresql"
